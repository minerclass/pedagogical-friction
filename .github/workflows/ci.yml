name: Ecosystem Quality Checks
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-terminology:
    name: Terminology Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Terminology Lint Script
        run: |
          echo "Scanning for outdated terminology..."
          FILES=$(find . -type f -name "*.html" -o -name "*.md")
          ERRORS=0
          WARNINGS=0
          
          # Forbidden terms
          FORBIDDEN=("collective instrumental case study" "Stake-aligned" "applied case study" "three framework dimensions")
          # Review required terms
          REVIEW=("cognitive friction" "results show" "proves" "validates" "findings demonstrate")
          # Note: "Allowed with context" implies we warn instead of fail for certain terms unless excluded.
          
          for file in $FILES; do
            for term in "${FORBIDDEN[@]}"; do
              MATCHES=$(grep -in "$term" "$file" | grep -iv "terminology-allow" || true)
              if [ -n "$MATCHES" ]; then
                echo "$MATCHES" | while read -r line; do
                  line_num=$(echo "$line" | cut -d: -f1)
                  echo "::error file=$file,line=$line_num::Forbidden term found: '$term' (Rule: FORBIDDEN, Disposition: Blocked)"
                done
                ERRORS=$((ERRORS+1))
              fi
            done
            
            for term in "${REVIEW[@]}"; do
              MATCHES=$(grep -in "$term" "$file" | grep -iv "terminology-allow" || true)
              if [ -n "$MATCHES" ]; then
                echo "$MATCHES" | while read -r line; do
                  line_num=$(echo "$line" | cut -d: -f1)
                  echo "::warning file=$file,line=$line_num::Review required term found: '$term' (Rule: REVIEW, Disposition: Warning - Check context/allow-list)"
                done
                WARNINGS=$((WARNINGS+1))
              fi
            done
          done
          
          echo "Found $ERRORS errors and $WARNINGS warnings."
          if [ "$ERRORS" -gt 0 ]; then
            echo "Terminology linting failed due to forbidden terms."
            exit 1
          fi

  check-links:
    name: Broken Link Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lychee Link Checker
        uses: lycheeverse/lychee-action@v1.9.3
        with:
          args: >-
            --offline 
            --no-progress 
            --exclude-mail 
            --exclude '^https://(localhost|127\.0\.0\.1|login\.|auth\.|private\.)' 
            --max-retries 3 
            './**/*.html' './**/*.md' './**/*.json' './**/*.js'

  secret-scan:
    name: Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.74.0
        with:
          path: ./

  check-a11y:
    name: Accessibility Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
      - name: Sync ChromeDriver to the runner's Chrome
        run: |
          # @axe-core/cli bundles a ChromeDriver pinned to one Chrome major
          # version. When the runner image updates Chrome the two drift apart,
          # the browser session never starts, and every page is reported as
          # failing without a single check having run. That silently broke this
          # job between 2026-07-17 and 2026-07-22. Pin ChromeDriver to whatever
          # Chrome the runner actually has instead.
          CHROME_MAJOR=$(google-chrome --version | sed -E 's/[^0-9]*([0-9]+).*/\1/')
          echo "Runner Chrome major version: $CHROME_MAJOR"
          npm install -g "chromedriver@^${CHROME_MAJOR}.0.0"
          echo "CHROMEDRIVER_PATH=$(command -v chromedriver)" >> "$GITHUB_ENV"
      - name: Run axe-core CLI
        run: |
          npm install -g @axe-core/cli serve wait-on
          npx serve -l 3000 &
          SERVER_PID=$!
          npx wait-on http://localhost:3000

          # Gate on real WCAG barriers only. axe also ships advisory
          # best-practice rules (page-has-heading-one, landmark-one-main,
          # region, landmark-complementary-is-top-level). Those are useful
          # review notes but should not block a push, and mixing them with
          # genuine failures makes a red check impossible to read.
          TAGS=wcag2a,wcag2aa,wcag21a,wcag21aa

          # Note for anyone tempted to add --exclude for third-party embeds:
          # it was tried on 2026-07-22 and does not work. axe descends into
          # embedded frames and reports frame-crossing targets such as
          # "article:nth-child(3) > iframe .ndfHFb-c4YZDc-zTETae". Passing
          # --exclude "iframe[src*='drive.google.com']" did not suppress those
          # findings. Pages whose only violations come from vendor embed markup
          # go in .a11yignore instead, with the reason recorded in AGENT_LOG.md.

          # Optional .a11yignore: one path per line, '#' for comments. Use only
          # for generated bundles that cannot be fixed in this repo, and record
          # the reason in AGENT_LOG.md.
          should_skip() {
            [ -f .a11yignore ] || return 1
            while IFS= read -r pattern; do
              case "$pattern" in ''|\#*) continue ;; esac
              [ "$1" = "$pattern" ] && return 0
            done < .a11yignore
            return 1
          }

          FAILED=""
          SKIPPED=""
          TOOL_ERROR=0
          FILES=$(find . -type f -name "*.html" | sed 's|^./||')

          for file in $FILES; do
            if should_skip "$file"; then
              echo "::notice file=$file::Skipped by .a11yignore"
              SKIPPED="$SKIPPED $file"
              continue
            fi
            echo "::group::axe $file"
            set +e
            OUT=$(axe "http://localhost:3000/$file" \
              --chromedriver-path "$CHROMEDRIVER_PATH" \
              --tags "$TAGS" --exit 2>&1)
            CODE=$?
            set -e
            echo "$OUT"
            echo "::endgroup::"

            if echo "$OUT" | grep -qiE "session not created|only supports Chrome version|browser-driver-manager"; then
              echo "::error::axe could not start a browser for $file. This is a tooling failure, not an accessibility result."
              TOOL_ERROR=1
            elif [ "$CODE" -ne 0 ]; then
              echo "::error file=$file::axe found WCAG A/AA violations in $file"
              FAILED="$FAILED $file"
            fi
          done

          kill $SERVER_PID || true

          [ -n "$SKIPPED" ] && echo "Skipped (see .a11yignore):$SKIPPED"

          if [ "$TOOL_ERROR" -ne 0 ]; then
            echo "Accessibility checks could not run. Fix the Chrome and ChromeDriver pairing before trusting this job."
            exit 1
          fi

          if [ -n "$FAILED" ]; then
            echo "WCAG A/AA violations found in:$FAILED"
            exit 1
          fi

          echo "All checked pages passed WCAG A/AA."
