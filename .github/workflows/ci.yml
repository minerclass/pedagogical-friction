name: Ecosystem Quality Checks
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-terminology:
    name: Terminology Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Terminology Lint Script
        run: |
          echo "Scanning for outdated terminology..."
          FILES=$(find . -type f -name "*.html" -o -name "*.md")
          ERRORS=0
          WARNINGS=0
          
          # Forbidden terms
          FORBIDDEN=("collective instrumental case study" "Stake-aligned" "applied case study" "three framework dimensions")
          # Review required terms
          REVIEW=("cognitive friction" "results show" "proves" "validates" "findings demonstrate")
          # Note: "Allowed with context" implies we warn instead of fail for certain terms unless excluded.
          
          for file in $FILES; do
            for term in "${FORBIDDEN[@]}"; do
              if grep -in "$term" "$file"; then
                echo "::error file=$file::Forbidden term found: '$term'."
                ERRORS=$((ERRORS+1))
              fi
            done
            
            for term in "${REVIEW[@]}"; do
              if grep -in "$term" "$file"; then
                echo "::warning file=$file::Review required term found: '$term'. Check context/allow-list."
                WARNINGS=$((WARNINGS+1))
              fi
            done
          done
          
          echo "Found $ERRORS errors and $WARNINGS warnings."
          if [ "$ERRORS" -gt 0 ]; then
            echo "Terminology linting failed due to forbidden terms."
            exit 1
          fi

  check-links:
    name: Broken Link Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lychee Link Checker
        uses: lycheeverse/lychee-action@v1.9.3
        with:
          args: >-
            --offline 
            --no-progress 
            --exclude-mail 
            --exclude '^https://(localhost|127\.0\.0\.1|login\.|auth\.|private\.)' 
            --max-retries 3 
            './**/*.html' './**/*.md' './**/*.json' './**/*.js'

  secret-scan:
    name: Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.74.0
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  check-a11y:
    name: Accessibility Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
      - name: Run axe-core CLI
        run: |
          npm install -g @axe-core/cli serve wait-on
          # Start a static server
          npx serve -l 3000 &
          SERVER_PID=$!
          # Wait for it to be ready
          npx wait-on http://localhost:3000
          
          ERRORS=0
          # Find all HTML files, remove leading ./, and run axe against them via the server
          FILES=$(find . -type f -name "*.html" | sed 's|^./||')
          for file in $FILES; do
            echo "Testing http://localhost:3000/$file"
            # We don't fail immediately, we collect errors
            axe "http://localhost:3000/$file" --exit || ERRORS=$((ERRORS+1))
          done
          
          kill $SERVER_PID
          
          if [ "$ERRORS" -gt 0 ]; then
            echo "Axe accessibility checks failed on $ERRORS files."
            exit 1
          fi
